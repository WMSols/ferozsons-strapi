name: Deploy Strapi to Hostinger VPS

# This triggers the deployment ONLY when you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # This is the sequence of commands GitHub types into your VPS terminal
          script: |
            # CHANGE THIS to the actual path where your Strapi code lives on your server
            cd /home/strapi/htdocs/srv1615764.hstgr.cloud 
            
            git pull origin main
            npm install
            npm run build
            pm2 restart strapi
